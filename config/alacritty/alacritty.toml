# Hardhacker colorscheme for Alacritty (TOML)

[window]
opacity = 0.93  # 93% opaque

[colors.primary]
background = "0x30253a"
foreground = "0xf4e9fc"

[colors.cursor]
text = "0xeee9fc"
cursor = "0xd9daff"

[colors.normal]
black   = "0x282433"
red     = "0xe965a5"
green   = "0xb1f2a7"
yellow  = "0xebde76"
blue    = "0xb1baf4"
magenta = "0xe192ef"
cyan    = "0xb3f4f3"
white   = "0xeee9fc"

[colors.bright]
black   = "0x3f3951"
red     = "0xe965a5"
green   = "0xb1f2a7"
yellow  = "0xebde76"
blue    = "0xb1baf4"
magenta = "0xe192ef"
cyan    = "0xb3f4f3"
white   = "0xeee9fc"

[font]
builtin_box_drawing = true
size = 15.5
[font.normal]
family = "cozette"
style = "HiDpiCrossedSeven"
